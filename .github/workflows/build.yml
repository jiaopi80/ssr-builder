name: Build SSR for LEDE 17.01 brcm47xx/mips74k

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libncurses5-dev libncursesw5-dev gawk wget xz-utils

      - name: Download SDK
        run: |
          wget https://downloads.openwrt.org/releases/17.01.4/targets/brcm47xx/mips74k/lede-sdk-17.01.4-brcm47xx-mips74k_gcc-5.4.0_musl-1.1.16.Linux-x86_64.tar.xz
          tar xf lede-sdk-17.01.4-brcm47xx-mips74k_gcc-5.4.0_musl-1.1.16.Linux-x86_64.tar.xz
          cd lede-sdk-*
          # Fix feed URLs (lede-project -> openwrt)
          sed -i 's|downloads.lede-project.org|downloads.openwrt.org|g' feeds.conf.default
          cp feeds.conf.default feeds.conf

      - name: Setup feeds
        run: |
          cd lede-sdk-*
          ./scripts/feeds update base packages
          ./scripts/feeds install libpcre libopenssl libmbedtls zlib
          wget -P package/feeds/base/mbedtls/patches https://github.com/bettermanbao/lede/raw/lede-17.01.2/package/libs/mbedtls/patches/999-tweak-config-for-shadowsocks.patch

      - name: Clone SSR source
        run: |
          cd lede-sdk-*
          git clone -b master https://github.com/allenkey666/openwrt-shadowsocksR-libev-full.git package/shadowsocksR-libev-full

      - name: Configure
        run: |
          cd lede-sdk-*
          echo "CONFIG_PACKAGE_shadowsocksR-libev-full=y" >> .config
          echo "CONFIG_PACKAGE_shadowsocksR-libev-gfwlist-full=n" >> .config
          make defconfig

      - name: Compile
        run: |
          cd lede-sdk-*
          make package/shadowsocksR-libev-full/compile V=s -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssr-ipks-brcm47xx
          path: lede-sdk-*/bin/packages/mipsel_74kc/base/*.ipk
